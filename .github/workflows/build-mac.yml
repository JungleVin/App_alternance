name: Build Tracka.dmg
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run electron:build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - uses: actions/upload-artifact@v4
        with:
          name: Tracka-mac
          path: dist/*.dmg
          retention-days: 30
